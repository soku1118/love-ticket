<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会いに来て券</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ticket">

    <div class="top">
        <h1>💌 会いに来て券</h1>
        <p>Special Ticket</p>
    </div>

    <div class="center">

        <h2>いつでも会いに行きます。</h2>

        <p class="message">
            この券は世界で一枚だけ。<br>
            押した瞬間に使用済みになります。
        </p>

        <button id="useButton">
            ❤️ 会いに来てもらう
        </button>

        <p id="status">
            残り1回
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
